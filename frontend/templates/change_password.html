{% extends "base.html" %}

{% block title %}Change Password | SkillUp LMS{% endblock title %}

{% block content %}
<div class="px-4 py-4">
  <div class="mx-auto" style="max-width: 520px;">
    <div class="bg-white border rounded-4 p-4 shadow-sm">
      <div class="mb-4">
        <p class="page-subtitle mb-1">Account security</p>
        <h1 class="section-title h3 mb-0">Change your temporary password</h1>
      </div>

      {% if error %}
      <div class="alert alert-danger rounded-3" role="alert">
        {{ error }}
      </div>
      {% endif %}

      <form action="/change-password" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold" for="current_password">Temporary password</label>
          <input
            class="form-control rounded-3"
            id="current_password"
            name="current_password"
            type="password"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold" for="new_password">New password</label>
          <input
            class="form-control rounded-3"
            id="new_password"
            name="new_password"
            type="password"
            autocomplete="new-password"
            minlength="8"
            maxlength="128"
            required
          >
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" for="confirm_password">Confirm new password</label>
          <input
            class="form-control rounded-3"
            id="confirm_password"
            name="confirm_password"
            type="password"
            autocomplete="new-password"
            minlength="8"
            maxlength="128"
            required
          >
        </div>

        <button class="btn btn-dark rounded-3 w-100 fw-semibold" type="submit">
          Update password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock content %}

{% extends "base.html" %}

{% block title %}Module Content | SkillUp LMS{% endblock title %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/module_content.css?v=3">
{% endblock extra_css %}
{% block content %}
<div class="module-page">
    <div class="module-page-header">
        <div>
            <h1 class="page-title">Module Content</h1>
        </div>
        <button id="add-content-btn" class="primary-btn" style="display: none;">+ Add Content</button>
    </div>
    <div id="module-progress-card" class="module-progress-card" hidden>
        <div class="module-progress-head">
            <div>
                <span class="module-progress-label">Module Progress</span>
                <p id="module-progress-summary">Not opened yet</p>
            </div>
            <strong id="module-progress-percent">0%</strong>
        </div>
        <div class="module-progress-track" aria-hidden="true">
            <div id="module-progress-fill" class="module-progress-fill" style="width: 0%;"></div>
        </div>
    </div>
    <div id="content-status-message" class="content-status-message" role="status" aria-live="polite"></div>
    <div id="content-list" class="content-list"></div>
</div>

<div id="content-modal" class="content-modal" style="display: none;">
    <div class="modal-content content-edit-modal">
        <h2 id="content-modal-title">Add Content</h2>

        <label for="content-title-input">Title</label>
        <input type="text" id="content-title-input" placeholder="Lecture slides">

        <div class="form-row">
            <div>
                <label for="content-type-input">Type</label>
                <select id="content-type-input">
                    <option value="pdf">PDF</option>
                    <option value="video">Video</option>
                    <option value="image">Image</option>
                    <option value="document">Document</option>
                    <option value="link">Link</option>
                </select>
            </div>
            <div>
                <label for="content-category-input">Category</label>
                <select id="content-category-input">
                    <option value="">None</option>
                    <option value="lecture">Lecture</option>
                    <option value="tutorial">Tutorial</option>
                    <option value="assignment">Assignment</option>
                    <option value="reading">Reading</option>
                    <option value="quiz">Quiz</option>
                </select>
            </div>
        </div>

        <label for="content-file-input">File</label>
        <input type="file" id="content-file-input">

        <label for="content-position-input">Display order</label>
        <input type="number" id="content-position-input" min="1" step="1">

        <div class="modal-actions">
            <button id="save-content-btn">Save</button>
            <button id="close-content-modal-btn" type="button">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/static/js/module_content.js?v=11"></script>
{% endblock content %}
